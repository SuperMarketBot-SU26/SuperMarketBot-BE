# SmartMarketBot — chạy một lệnh: docker compose up -d --build
# API (FE/Mobile/IoT test): http://localhost:5000
# API docs (Scalar UI):    http://localhost:5000/scalar/v1  (hoặc /swagger → redirect)
# OpenAPI JSON:            http://localhost:5000/openapi/v1.json
# SignalR:                 http://localhost:5000/hubs/robot
# SQL (SSMS/tool):         localhost,1434
# MQTT:                    localhost:1883

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartmarketbot-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartmarketbot-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  face_service:
    build:
      context: ./face_service
      dockerfile: Dockerfile
    container_name: smartmarketbot-face-ai
    ports:
      - "8000:8000"
    environment:
      - DB_CONNECTION_STRING=DRIVER={ODBC Driver 18 for SQL Server};SERVER=sqlserver,1433;DATABASE=SuperMarketBot;UID=sa;PWD=YourStrong!Passw0rd;Encrypt=yes;TrustServerCertificate=yes;
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./storage:/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartmarketbot-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      sqlserver:
        condition: service_healthy
      mosquitto:
        condition: service_started
      face_service:
        condition: service_started
    restart: unless-stopped

volumes:
  sqlserver_data:
