# SmartMarketBot — chạy một lệnh: docker compose up -d --build
# API (FE/Mobile/IoT test): http://localhost:5000
# API docs (Scalar UI):    http://localhost:5000/scalar/v1  (hoặc /swagger → redirect)
# OpenAPI JSON:            http://localhost:5000/openapi/v1.json
# SignalR:                 http://localhost:5000/hubs/robot
# SQL (SSMS/tool):         localhost,1434
# MQTT:                    localhost:1883
#
# Lưu ý: Python Face Service đã được move sang repo SuperMarketBot-AI.
#        BE gọi qua HTTP đến AiServiceOptions.BaseUrl (xem appsettings.Docker.json).

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartmarketbot-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartmarketbot-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      # Supabase Storage — dùng cho upload ảnh mặt bằng (Map floorplan) và ad resources
      Supabase__Url: "${SUPABASE_URL:-https://your-project.supabase.co}"
      Supabase__ApiKey: "${SUPABASE_API_KEY:-your-anon-key}"
      Supabase__StorageBucket: "${SUPABASE_STORAGE_BUCKET:-floorplans}"
    depends_on:
      mosquitto:
        condition: service_started
      ai-service:
        condition: service_started
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smartmarketbot-ai
    ports:
      - "8000:8000"
    restart: unless-stopped
